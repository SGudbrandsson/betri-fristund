  <!-- Sun emoji -->
  <text x="600" y="220" font-family="'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif" font-size="120" text-anchor="middle">☀️</text>

  <!-- Main title -->
  <text x="600" y="330" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="#1C1917" text-anchor="middle" letter-spacing="-1">Betri Frístund</text>

  <!-- Subtitle -->
