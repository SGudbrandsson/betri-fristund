<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FFFBF5"/>

  <!-- Orange bottom strip -->
  <rect x="0" y="550" width="1200" height="80" fill="#EA580C"/>

  <!-- Decorative orange top accent line -->
